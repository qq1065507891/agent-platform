services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agent_platform_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: 512m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: agent_platform_redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  db_preflight:
    image: pgvector/pgvector:pg16
    container_name: agent_platform_db_preflight
    restart: "no"
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    command:
      - /bin/sh
      - -lc
      - >-
        psql -h postgres -U ${POSTGRES_USER} -d ${POSTGRES_DB}
        -v ON_ERROR_STOP=1
        -c "SELECT version();"
        -c "CREATE EXTENSION IF NOT EXISTS vector;"
        -c "SELECT extname FROM pg_extension WHERE extname='vector';"
    depends_on:
      postgres:
        condition: service_healthy
    mem_limit: 128m
    cpus: 0.25
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent_platform_migrate
    env_file:
      - .env
    environment:
      DB_URL: ${DB_URL}
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      db_preflight:
        condition: service_completed_successfully
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent_platform_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DB_URL: ${DB_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CHROMA_PERSIST_PATH: /app/chroma
    volumes:
      - chroma_data:/app/chroma
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 1024m
    cpus: 1.5
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent_platform_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-prod}
      DB_URL: ${DB_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CHROMA_PERSIST_PATH: /app/chroma
    command: ["celery", "-A", "app.core.celery_app:celery_app", "worker", "--loglevel=INFO"]
    volumes:
      - chroma_data:/app/chroma
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      backend:
        condition: service_healthy
    mem_limit: 1024m
    cpus: 1.0
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agent_platform_frontend
    restart: unless-stopped
    ports:
      - "3000:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  caddy:
    image: caddy:2.9-alpine
    container_name: agent_platform_gateway
    restart: unless-stopped
    profiles: ["gateway"]
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  caddy_data:
  caddy_config:
